<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <title>Artykuły</title>
  </head>
  <body class="bg-stone-100 p-8">

    <h1 class="text-3xl font-bold text-center text-[#7a1535] mb-6">Artykuły</h1>

    <select id="sort" class="border rounded p-2 mb-6 w-full max-w-3xl block mx-auto">
      <option value="created_at.asc">po dacie rosnąco</option>
      <option value="created_at.desc">po dacie malejąco</option>
      <option value="title.asc">po nazwie alfabetycznie</option>
    </select>

    <div id="articles" class="max-w-3xl mx-auto space-y-4"></div>

    <h2 class="text-xl font-bold text-[#7a1535] mt-10 mb-4 max-w-3xl mx-auto">Dodaj artykuł</h2>

    <form id="form" class="max-w-3xl mx-auto bg-white rounded shadow p-6">
      <label class="block mb-1">Tytuł</label>
      <input id="title" type="text" required class="border rounded p-2 w-full mb-4" />

      <label class="block mb-1">Podtytuł</label>
      <input id="subtitle" type="text" required class="border rounded p-2 w-full mb-4" />

      <label class="block mb-1">Autor</label>
      <input id="author" type="text" required class="border rounded p-2 w-full mb-4" />

      <label class="block mb-1">Treść</label>
      <textarea id="content" required rows="5" class="border rounded p-2 w-full mb-4"></textarea>

      <label class="block mb-1">Data utworzenia</label>
      <input id="created_at" type="date" class="border rounded p-2 w-full mb-4" />

      <button type="submit" class="bg-[#7a1535] text-white px-6 py-2 rounded">Dodaj artykuł</button>
      <p id="form-message" class="text-green-600 mt-2 hidden">Artykuł dodany!</p>
    </form>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
